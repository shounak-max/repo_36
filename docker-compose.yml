services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/task_manager
      POSTGRES_URL_NON_POOLING: postgres://postgres:postgres@postgres:5432/task_manager
      ADMIN_API_KEY: local-admin-key-change-me
      API_KEY_SALT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
    ports:
      - "3000:3000"

volumes:
  postgres-data:
